<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人形机器人专利分析大屏</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans SC', 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: transparent;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .dashboard {
            padding: 20px;
            max-width: 1920px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 16px 0 24px;
            position: relative;
        }
        
        .header::before, .header::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 180px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #667eea, transparent);
        }
        
        .header::before { left: 8%; }
        .header::after { right: 8%; }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
        }
        
        .header p {
            color: #8892b0;
            margin-top: 6px;
            font-size: 13px;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 260px 1fr 260px;
            gap: 16px;
            margin-top: 16px;
        }
        
        .panel {
            background: transparent;
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 14px;
            padding: 16px;
        }
        
        .panel-title {
            font-size: 13px;
            color: #667eea;
            border-left: 3px solid #667eea;
            padding-left: 10px;
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .panel-title svg {
            width: 16px;
            height: 16px;
            opacity: 0.8;
        }
        
        .map-container {
            grid-column: 2;
            grid-row: 1 / 3;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }
        
        #china-map {
            flex: 1;
            min-height: 500px;
            position: relative;
            background: transparent;
            border-radius: 12px;
        }
        
        .left-panel, .right-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .stat-card {
            background: transparent;
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            background: rgba(102, 126, 234, 0.05);
        }
        
        .stat-value {
            font-size: 38px;
            font-weight: 700;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            color: #8892b0;
            font-size: 11px;
            margin-top: 6px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        
        .stat-mini {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        
        .stat-mini .value {
            font-size: 18px;
            font-weight: 600;
            color: #a8b2d1;
        }
        
        .stat-mini .label {
            font-size: 10px;
            color: #646a80;
            margin-top: 4px;
        }
        
        .chart-container {
            height: 160px;
            position: relative;
        }
        
        .map-toolbar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .map-btn {
            background: rgba(102, 126, 234, 0.12);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            padding: 8px 20px;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            font-weight: 500;
        }
        
        .map-btn:hover, .map-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        /* 悬浮框 - 可交互 */
        .province-tooltip {
            position: fixed;
            background: linear-gradient(145deg, rgba(25, 28, 45, 0.98), rgba(18, 20, 35, 0.99));
            border: 1px solid rgba(102, 126, 234, 0.4);
            border-radius: 14px;
            padding: 16px;
            width: 320px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(16px);
            pointer-events: auto;
        }
        
        .province-tooltip.visible {
            display: block;
        }
        
        .province-tooltip h3 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }
        
        .patent-list {
            max-height: 280px;
            overflow-y: auto;
        }
        
        .patent-item {
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 6px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
        }
        
        .patent-item:hover {
            background: rgba(102, 126, 234, 0.15);
            border-color: rgba(102, 126, 234, 0.3);
            transform: translateX(4px);
        }
        
        .patent-item .public-number {
            color: #a8b2d1;
            font-size: 12px;
            font-weight: 600;
        }
        
        .patent-item .title {
            color: #8892b0;
            font-size: 12px;
            margin-top: 4px;
            line-height: 1.4;
        }
        
        /* 专利详情弹窗 */
        .patent-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }
        
        .patent-modal.active { display: flex; }
        
        .patent-detail {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            width: 100%;
            max-width: 850px;
            max-height: 88vh;
            overflow-y: auto;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(102, 126, 234, 0.1);
        }
        
        .patent-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }
        
        .patent-detail h2 {
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 20px;
        }
        
        .close-btn {
            background: rgba(102, 126, 234, 0.1);
            border: none;
            color: #667eea;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 36px;
            height: 36px;
            line-height: 36px;
            border-radius: 50%;
        }
        
        .close-btn:hover { 
            background: rgba(102, 126, 234, 0.2);
            transform: rotate(90deg);
        }
        
        .patent-info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .info-item {
            background: rgba(102, 126, 234, 0.06);
            border: 1px solid rgba(102, 126, 234, 0.12);
            border-radius: 10px;
            padding: 14px;
        }
        
        .info-item label {
            color: #646a80;
            font-size: 10px;
            display: block;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .info-item span {
            color: #ccd6f6;
            font-size: 13px;
            word-break: break-all;
            line-height: 1.5;
        }
        
        .info-item.full { grid-column: 1 / -1; }
        
        /* 图例 - 渐变条 */
        .legend-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
        }
        
        .legend-gradient {
            width: 200px;
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(90deg, #1a1a2e, #667eea, #764ba2, #f093fb);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        
        .legend-label {
            color: #646a80;
            font-size: 11px;
        }
        
        /* 加载 */
        .loading-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #667eea;
        }
        
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .current-location {
            text-align: center;
            color: #a8b2d1;
            font-size: 13px;
            margin-bottom: 10px;
            padding: 8px 16px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 20px;
            display: inline-block;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { background: #667eea; border-radius: 3px; }
        
        @media (max-width: 1400px) {
            .main-grid { grid-template-columns: 220px 1fr 220px; }
        }
        
        @media (max-width: 1100px) {
            .main-grid { grid-template-columns: 1fr; }
            .map-container { grid-column: 1; grid-row: auto; }
        }
        
        /* 桑基图和转让网络图样式 */
        .flow-section {
            margin-top: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .flow-panel {
            background: transparent;
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 14px;
            padding: 16px;
        }
        
        .flow-panel .panel-title {
            font-size: 14px;
            color: #667eea;
            border-left: 3px solid #667eea;
            padding-left: 10px;
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .flow-chart-container {
            height: 400px;
            position: relative;
            background: rgba(26, 26, 46, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .flow-chart-container svg {
            width: 100%;
            height: 100%;
        }
        
        .sankey-link {
            fill: none;
            stroke-opacity: 0.5;
            transition: stroke-opacity 0.3s ease;
        }
        
        .sankey-link:hover {
            stroke-opacity: 0.9;
        }
        
        .sankey-node rect {
            cursor: pointer;
            transition: fill 0.3s ease;
        }
        
        .sankey-node rect:hover {
            fill-opacity: 0.8;
        }
        
        .sankey-node text {
            font-size: 11px;
            fill: #a8b2d1;
            pointer-events: none;
        }
        
        /* 网络图样式 */
        .network-node circle {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .network-node circle:hover {
            stroke: #f093fb;
            stroke-width: 3px;
        }
        
        .network-node text {
            font-size: 10px;
            fill: #8892b0;
            pointer-events: none;
        }
        
        .network-link {
            stroke: #667eea;
            stroke-opacity: 0.3;
            transition: stroke-opacity 0.3s ease;
        }
        
        .network-link:hover {
            stroke-opacity: 0.8;
        }
        
        .flow-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .flow-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #8892b0;
        }
        
        .flow-legend-color {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }
        
        /* 切换按钮 */
        .chart-toggle {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .toggle-btn {
            background: rgba(102, 126, 234, 0.12);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 16px;
            padding: 6px 16px;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 11px;
            font-weight: 500;
        }
        
        .toggle-btn:hover, .toggle-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>人形机器人专利分析大屏</h1>
            <p>人形机器人领域专利数据分析与可视化系统</p>
        </div>
        
        <div class="main-grid">
            <div class="left-panel">
                <div class="panel">
                    <div class="panel-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                        数据概览
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="total-patents">--</div>
                        <div class="stat-label">专利总数</div>
                        <div class="stat-grid">
                            <div class="stat-mini">
                                <div class="value" id="total-provinces">--</div>
                                <div class="label">省份数量</div>
                            </div>
                            <div class="stat-mini">
                                <div class="value" id="total-cities">--</div>
                                <div class="label">城市数量</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="panel">
                    <div class="panel-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                        专利类型分布
                    </div>
                    <div class="chart-container" id="patent-type-chart"></div>
                </div>
                
                <div class="panel">
                    <div class="panel-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <path d="M9 9h6v6H9z"/>
                        </svg>
                        法律状态分布
                    </div>
                    <div class="chart-container" id="legal-status-chart"></div>
                </div>
            </div>
            
            <div class="panel map-container">
                <div class="panel-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                    中国专利热力分布
                </div>
                <div class="current-location" id="current-location" style="display:none;">当前位置: 全国</div>
                <div class="map-toolbar">
                    <button class="map-btn active" id="btn-china" onclick="showChinaView()">全国视图</button>
                    <button class="map-btn" id="btn-back" style="display:none;" onclick="goBack()">返回全国</button>
                </div>
                <div id="china-map">
                    <div class="loading-overlay" id="map-loading">
                        <div class="spinner"></div>
                        <div>地图加载中...</div>
                    </div>
                </div>
                <div class="legend-bar">
                    <span class="legend-label">低密度</span>
                    <div class="legend-gradient"></div>
                    <span class="legend-label">高密度</span>
                </div>
            </div>
            
            <div class="right-panel">
                <div class="panel">
                    <div class="panel-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                        </svg>
                        申请年份趋势
                    </div>
                    <div class="chart-container" id="year-trend-chart"></div>
                </div>
                
                <div class="panel">
                    <div class="panel-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                        </svg>
                        IPC分类 Top 10
                    </div>
                    <div class="chart-container" id="ipc-chart"></div>
                </div>
                
                <div class="panel">
                    <div class="panel-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                        </svg>
                        引用与同族统计
                    </div>
                    <div id="citation-stats" style="padding: 8px 0;"></div>
                </div>
            </div>
        </div>
        
        <!-- 桑基图和转让网络图区域 -->
        <div class="flow-section">
            <div class="flow-panel">
                <div class="panel-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                    </svg>
                    专利类型流转桑基图
                </div>
                <div class="chart-toggle">
                    <button class="toggle-btn active" onclick="switchSankeyType('legal')">法律状态流转</button>
                    <button class="toggle-btn" onclick="switchSankeyType('ipc')">IPC分类流转</button>
                    <button class="toggle-btn" onclick="switchSankeyType('topic')">主题-IPC</button>
                </div>
                <div class="flow-chart-container" id="sankey-chart">
                    <div class="loading-overlay">
                        <div class="spinner"></div>
                        <div style="color:#667eea;font-size:12px;">桑基图加载中...</div>
                    </div>
                </div>
                <div class="flow-legend">
                    <div class="flow-legend-item">
                        <div class="flow-legend-color" style="background:#667eea;"></div>
                        <span>发明申请</span>
                    </div>
                    <div class="flow-legend-item">
                        <div class="flow-legend-color" style="background:#764ba2;"></div>
                        <span>授权发明</span>
                    </div>
                    <div class="flow-legend-item">
                        <div class="flow-legend-color" style="background:#f093fb;"></div>
                        <span>实用新型</span>
                    </div>
                    <div class="flow-legend-item">
                        <div class="flow-legend-color" style="background:#64b5f6;"></div>
                        <span>外观设计</span>
                    </div>
                </div>
            </div>
            
            <div class="flow-panel">
                <div class="panel-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <circle cx="12" cy="12" r="3"/>
                        <circle cx="4" cy="6" r="2"/>
                        <circle cx="20" cy="6" r="2"/>
                        <circle cx="4" cy="18" r="2"/>
                        <circle cx="20" cy="18" r="2"/>
                        <line x1="9.5" y1="10" x2="6" y2="7"/>
                        <line x1="14.5" y1="10" x2="18" y2="7"/>
                        <line x1="9.5" y1="14" x2="6" y2="17"/>
                        <line x1="14.5" y1="14" x2="18" y2="17"/>
                    </svg>
                    专利权转让网络图
                </div>
                <div class="chart-toggle">
                    <button class="toggle-btn active" onclick="switchNetworkType('province')">省份流转网络</button>
                    <button class="toggle-btn" onclick="switchNetworkType('transfer')">许可转让网络</button>
                </div>
                <div class="flow-chart-container" id="network-chart">
                    <div class="loading-overlay">
                        <div class="spinner"></div>
                        <div style="color:#667eea;font-size:12px;">网络图加载中...</div>
                    </div>
                </div>
                <div class="flow-legend">
                    <div class="flow-legend-item">
                        <div class="flow-legend-color" style="background:#667eea;"></div>
                        <span>许可人/转让人</span>
                    </div>
                    <div class="flow-legend-item">
                        <div class="flow-legend-color" style="background:#764ba2;"></div>
                        <span>被许可人/受让人</span>
                    </div>
                    <div class="flow-legend-item">
                        <div class="flow-legend-color" style="background:#667eea;"></div>
                        <span>节点大小=专利数量</span>
                    </div>
                    <div class="flow-legend-item">
                        <div class="flow-legend-color" style="background:#764ba2;"></div>
                        <span>连线粗细=流转次数</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 可交互的省份悬浮框 -->
    <div class="province-tooltip" id="province-tooltip">
        <h3>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
            </svg>

    <!-- 专利详情弹窗 -->
    <div class="patent-modal" id="patent-modal">
        <div class="patent-detail">
            <div class="patent-detail-header">
                <h2 id="modal-title">专利详情</h2>
                <button class="close-btn" onclick="closePatentModal()">&times;</button>
            </div>
            <div id="patent-content"></div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:5000/api';
        
        let allProvinceData = [];
        let provinceData = [];
        let cityData = {};
        let currentView = 'china';
        let currentProvince = null;
        let tooltipTimeout = null;
        let chinaGeoData = null;
        let isTooltipHovered = false;
        let clickTimer = null;
        let lastClickTarget = null;
        
        // 渐变配色方案
        const COLORS = {
            primary: '#667eea',
            secondary: '#764ba2',
            accent: '#f093fb',
            text: '#ccd6f6',
            textMuted: '#8892b0',
            bgDark: '#1a1a2e',
            chartColors: ['#667eea', '#764ba2', '#f093fb', '#a8b2d1', '#64b5f6', '#81c784', '#ffb74d', '#ce93d8', '#4dd0e1', '#90a4ae']
        };
        
        document.addEventListener('DOMContentLoaded', async () => {
            await loadOverviewStats();
            await loadProvinceStats();
            await loadPatentTypeChart();
            await loadLegalStatusChart();
            await loadYearTrendChart();
            await loadIPCChart();
            await loadCitationStats();
            await initMap();
            // 加载桑基图和网络图
            await loadSankeyChart('legal');
            await loadNetworkChart('province');
        });
        
        async function loadOverviewStats() {
            try {
                const response = await fetch(`${API_BASE}/stats/overview`);
                const data = await response.json();
                if (data.success) {
                    document.getElementById('total-patents').textContent = data.data.total_patents.toLocaleString();
                }
            } catch (e) { console.error(e); }
        }
        
        async function loadProvinceStats() {
            try {
                const response = await fetch(`${API_BASE}/provinces`);
                const data = await response.json();
                if (data.success) {
                    allProvinceData = data.data;
                    provinceData = data.data;
                    document.getElementById('total-provinces').textContent = data.data.length;
                }
            } catch (e) { console.error(e); }
        }
        
        async function loadPatentTypeChart() {
            try {
                const response = await fetch(`${API_BASE}/stats/patent-types`);
                const data = await response.json();
                if (data.success && data.data.length > 0) {
                    const container = document.getElementById('patent-type-chart');
                    container.innerHTML = '';
                    const width = container.clientWidth;
                    const height = 160;
                    
                    const svg = d3.select(container).append('svg').attr('width', width).attr('height', height);
                    const radius = Math.min(width, height) / 2 - 25;
                    const innerRadius = radius * 0.6;
                    
                    const g = svg.append('g').attr('transform', `translate(${width/2}, ${height/2 - 15})`);
                    const pie = d3.pie().value(d => d.count).sort(null);
                    const arc = d3.arc().innerRadius(innerRadius).outerRadius(radius);
                    
                    const arcs = g.selectAll('path')
                        .data(pie(data.data))
                        .enter()
                        .append('path')
                        .attr('d', arc)
                        .attr('fill', (d, i) => COLORS.chartColors[i % COLORS.chartColors.length])
                        .attr('stroke', '#0f0f1a')
                        .attr('stroke-width', 2);
                    
                    g.append('text').attr('text-anchor', 'middle').attr('dy', '-0.2em')
                        .attr('fill', COLORS.textMuted).attr('font-size', '10px').text('专利类型');
                    g.append('text').attr('text-anchor', 'middle').attr('dy', '1em')
                        .attr('fill', COLORS.primary).attr('font-size', '16px').attr('font-weight', 'bold')
                        .text(data.data.reduce((sum, d) => sum + d.count, 0));
                    
                    // 添加图例
                    const legend = svg.append('g').attr('transform', `translate(10, ${height - 35})`);
                    const legendItems = legend.selectAll('g').data(data.data).enter().append('g').attr('transform', (d, i) => `translate(${i * 55}, 0)`);
                    
                    legendItems.append('rect').attr('width', 10).attr('height', 10).attr('rx', 2)
                        .attr('fill', (d, i) => COLORS.chartColors[i % COLORS.chartColors.length]);
                    
                    legendItems.append('text').attr('x', 13).attr('y', 9)
                        .attr('fill', COLORS.textMuted).attr('font-size', '9px')
                        .text(d => d.patent_type ? d.patent_type.substring(0, 4) : '');
                }
            } catch (e) { console.error(e); }
        }
        
        async function loadLegalStatusChart() {
            try {
                const response = await fetch(`${API_BASE}/stats/legal`);
                const data = await response.json();
                if (data.success && data.data.length > 0) {
                    const container = document.getElementById('legal-status-chart');
                    container.innerHTML = '';
                    const width = container.clientWidth;
                    const height = 160;
                    const margin = {top: 10, right: 10, bottom: 50, left: 10};
                    
                    const svg = d3.select(container).append('svg').attr('width', width).attr('height', height);
                    
                    const x = d3.scaleBand().domain(data.data.map(d => d.status)).range([margin.left, width - margin.right]).padding(0.3);
                    const y = d3.scaleLinear().domain([0, d3.max(data.data, d => d.count)]).range([height - margin.bottom, margin.top]);
                    
                    // 绘制柱状图
                    svg.selectAll('rect').data(data.data).enter().append('rect')
                        .attr('x', d => x(d.status))
                        .attr('y', d => y(d.count))
                        .attr('width', x.bandwidth())
                        .attr('height', d => height - margin.bottom - y(d.count))
                        .attr('fill', (d, i) => COLORS.chartColors[i % COLORS.chartColors.length])
                        .attr('rx', 4).attr('ry', 4);
                    
                    // 中文标签映射
                    const statusLabels = {
                        'Granted': '已授权',
                        'Examination': '审查中',
                        'Published': '已公开',
                        'Rejected': '已驳回',
                        'Withdrawn': '已撤回',
                        'Lapsed': '已失效',
                        'Other': '其他'
                    };
                    
                    // 绘制X轴标签 - 垂直排列
                    svg.append('g').attr('transform', `translate(0, ${height - margin.bottom})`)
                        .selectAll('text').data(data.data).enter().append('text')
                        .attr('x', d => x(d.status) + x.bandwidth() / 2)
                        .attr('y', 12)
                        .attr('text-anchor', 'middle')
                        .attr('fill', COLORS.textMuted)
                        .attr('font-size', '9px')
                        .text(d => statusLabels[d.status] || d.status);
                }
            } catch (e) { console.error(e); }
        }
        
        async function loadYearTrendChart() {
            try {
                const response = await fetch(`${API_BASE}/stats/years`);
                const data = await response.json();
                if (data.success && data.data.length > 0) {
                    const container = document.getElementById('year-trend-chart');
                    container.innerHTML = '';
                    const width = container.clientWidth;
                    const height = 160;
                    const margin = {top: 15, right: 10, bottom: 25, left: 35};
                    
                    const svg = d3.select(container).append('svg').attr('width', width).attr('height', height);
                    
                    const x = d3.scaleLinear().domain(d3.extent(data.data, d => d.year)).range([margin.left, width - margin.right]);
                    const y = d3.scaleLinear().domain([0, d3.max(data.data, d => d.count)]).range([height - margin.bottom, margin.top]);
                    
                    const line = d3.line().x(d => x(d.year)).y(d => y(d.count)).curve(d3.curveMonotoneX);
                    svg.append('path').datum(data.data).attr('fill', 'none').attr('stroke', COLORS.primary)
                        .attr('stroke-width', 2.5).attr('d', line);
                    
                    svg.selectAll('circle').data(data.data).enter().append('circle')
                        .attr('cx', d => x(d.year)).attr('cy', d => y(d.count))
                        .attr('r', 4).attr('fill', COLORS.secondary).attr('stroke', '#0f0f1a').attr('stroke-width', 2);
                    
                    svg.append('g').attr('transform', `translate(0, ${height - margin.bottom})`)
                        .call(d3.axisBottom(x).tickFormat(d3.format('d')).ticks(5))
                        .selectAll('text').attr('fill', COLORS.textMuted);
                }
            } catch (e) { console.error(e); }
        }
        
        async function loadIPCChart() {
            try {
                const response = await fetch(`${API_BASE}/stats/ipc?limit=10`);
                const data = await response.json();
                if (data.success && data.data.length > 0) {
                    const container = document.getElementById('ipc-chart');
                    container.innerHTML = '';
                    const width = container.clientWidth;
                    const height = 160;
                    const margin = {top: 5, right: 40, bottom: 5, left: 50};
                    
                    const svg = d3.select(container).append('svg').attr('width', width).attr('height', height);
                    
                    const y = d3.scaleBand().domain(data.data.map(d => d.ipc_subclass)).range([margin.top, height - margin.bottom]).padding(0.3);
                    const x = d3.scaleLinear().domain([0, d3.max(data.data, d => d.count)]).range([margin.left, width - margin.right]);
                    
                    data.data.forEach((d, i) => {
                        const color = COLORS.chartColors[i % COLORS.chartColors.length];
                        svg.append('rect').attr('y', y(d.ipc_subclass)).attr('height', y.bandwidth())
                            .attr('x', margin.left).attr('width', x(d.count) - margin.left)
                            .attr('fill', color).attr('rx', 3);
                        
                        svg.append('text').attr('x', margin.left - 5).attr('y', y(d.ipc_subclass) + y.bandwidth() / 2)
                            .attr('dy', '0.35em').attr('text-anchor', 'end').attr('fill', COLORS.textMuted).attr('font-size', '10px')
                            .text(d.ipc_subclass);
                        
                        svg.append('text').attr('x', x(d.count) + 5).attr('y', y(d.ipc_subclass) + y.bandwidth() / 2)
                            .attr('dy', '0.35em').attr('fill', color).attr('font-size', '10px').attr('font-weight', '600')
                            .text(d.count);
                    });
                }
            } catch (e) { console.error(e); }
        }
        
        async function loadCitationStats() {
            try {
                const response = await fetch(`${API_BASE}/stats/citations`);
                const data = await response.json();
                if (data.success) {
                    const s = data.data;
                    document.getElementById('citation-stats').innerHTML = `
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                            <div style="background:rgba(102,126,234,0.1);padding:10px;border-radius:8px;text-align:center;">
                                <div style="color:${COLORS.primary};font-size:18px;font-weight:bold;">${s.citations_5yr.mean.toFixed(1)}</div>
                                <div style="color:#646a80;font-size:10px;">5年引用均值</div>
                            </div>
                            <div style="background:rgba(118,75,162,0.1);padding:10px;border-radius:8px;text-align:center;">
                                <div style="color:${COLORS.secondary};font-size:18px;font-weight:bold;">${s.citations_3yr.mean.toFixed(1)}</div>
                                <div style="color:#646a80;font-size:10px;">3年引用均值</div>
                            </div>
                            <div style="background:rgba(240,147,251,0.1);padding:10px;border-radius:8px;text-align:center;">
                                <div style="color:${COLORS.accent};font-size:18px;font-weight:bold;">${s.family_count.mean.toFixed(1)}</div>
                                <div style="color:#646a80;font-size:10px;">同族专利均值</div>
                            </div>
                            <div style="background:rgba(168,178,209,0.1);padding:10px;border-radius:8px;text-align:center;">
                                <div style="color:${COLORS.text};font-size:18px;font-weight:bold;">${s.citations_5yr.max}</div>
                                <div style="color:#646a80;font-size:10px;">最高引用</div>
                            </div>
                        </div>
                    `;
                }
            } catch (e) { console.error(e); }
        }
        
        async function initMap() {
            const container = document.getElementById('china-map');
            const loading = document.getElementById('map-loading');
            chinaGeoData = null;
            window.chinaGeoData = null;
            
            try {
                // 从后端API获取高德地图数据
                const response = await fetch(`${API_BASE}/map/geojson`);
                const result = await response.json();
                
                if (result.success && result.data && result.data.features && result.data.features.length > 0) {
                    chinaGeoData = result.data;
                    window.chinaGeoData = result.data;
                    console.log('GeoJSON loaded, features:', result.data.features.length);
                    console.log('Sample feature:', result.data.features[0]);
                    loading.style.display = 'none';
                    drawMap('china');
                } else {
                    throw new Error(result.message || 'Invalid GeoJSON data');
                }
            } catch (e) {
                console.error('Map load failed:', e);
                loading.innerHTML = '<div style="color:#667eea;text-align:center;padding:20px;">地图加载失败<br><small>' + e.message + '</small></div>';
            }
        }
        
        function drawMap(viewType) {
            const container = document.getElementById('china-map');
            container.innerHTML = '';
            
            const width = container.clientWidth || 600;
            const height = container.clientHeight || 500;
            
            const svg = d3.select(container).append('svg')
                .attr('width', '100%')
                .attr('height', '100%')
                .attr('viewBox', '0 0 ' + width + ' ' + height);
            
            const geoData = chinaGeoData;
            if (!geoData || !geoData.features || geoData.features.length === 0) {
                svg.append('text').attr('x', width/2).attr('y', height/2)
                    .attr('text-anchor', 'middle').attr('fill', '#667eea')
                    .text('地图数据加载失败');
                return;
            }
            
            const features = geoData.features;
            
            // 使用geoFitSize自动适配
            const projection = d3.geoMercator()
                .fitSize([width, height], geoData);
            
            const pathGenerator = d3.geoPath().projection(projection);
            
            // 渐变色比例尺
            const maxCount = Math.max(...provinceData.map(d => d.patent_count || d.count || 0), 1);
            const colorScale = d3.scaleSequential(d3.interpolatePurples).domain([0, maxCount]);
            
            // 创建省份名称到专利数据的映射
            const provinceMap = {};
            provinceData.forEach(p => {
                const key = normalizeName(p.province_name || '');
                provinceMap[key] = p;
            });
            
            // 绘制地图
            const g = svg.append('g');
            
            g.selectAll('path')
                .data(features)
                .enter()
                .append('path')
                .attr('d', pathGenerator)
                .attr('fill', d => {
                    const name = d.properties ? (d.properties.name || '') : '';
                    const key = normalizeName(name);
                    const data = provinceMap[key];
                    const count = data ? (data.patent_count || data.count || 0) : 0;
                    return count > 0 ? colorScale(count) : '#5a5a7a';
                })
                .attr('stroke', '#3a3a5a')
                .attr('stroke-width', 1)
                .style('cursor', 'pointer')
                .on('mouseenter', function(event, d) {
                    d3.select(this).attr('stroke', '#667eea').attr('stroke-width', 2);
                    showProvinceTooltip(event, d.properties?.name || '', 'china');
                })
                .on('mouseleave', function() {
                    d3.select(this).attr('stroke', '#3a3a5a').attr('stroke-width', 1);
                });
            
            // 添加专利数量标签
            g.selectAll('text')
                .data(features)
                .enter()
                .append('text')
                .attr('transform', d => {
                    const centroid = pathGenerator.centroid(d);
                    return `translate(${centroid[0]}, ${centroid[1]})`;
                })
                .attr('text-anchor', 'middle')
                .attr('fill', 'white')
                .attr('font-size', '10px')
                .attr('pointer-events', 'none')
                .text(d => {
                    const name = d.properties ? (d.properties.name || '') : '';
                    const key = normalizeName(name);
                    const data = provinceMap[key];
                    return data ? (data.patent_count || 0) : '';
                });
        }
        
        function handleMapClick(event, name, viewType) {
            if (clickTimer && lastClickTarget === event.target) {
                clearTimeout(clickTimer);
                clickTimer = null;
                if (viewType === 'china') {
                    selectProvince(name);
                }
            } else {
                lastClickTarget = event.target;
                clickTimer = setTimeout(() => {
                    clickTimer = null;
                }, 300);
            }
        }
        
        function normalizeName(name) {
            if (!name) return '';
            // 处理 "北京市" -> "北京", "内蒙古自治区" -> "内蒙古" 等
            return name.replace(/省|市|自治区|回族自治区|壮族自治区|维吾尔自治区|特别行政区/g, '').trim();
        }

        function getProvinceLabels() {
            return [
                { name: '北京', coords: [116.4, 39.9] }, { name: '广东', coords: [113, 23] },
                { name: '江苏', coords: [120, 33] }, { name: '浙江', coords: [120, 29] },
                { name: '山东', coords: [118, 36] }, { name: '河南', coords: [113, 34] },
                { name: '四川', coords: [104, 30] }, { name: '湖北', coords: [112, 31] },
                { name: '安徽', coords: [117, 32] }, { name: '湖南', coords: [112, 28] },
                { name: '福建', coords: [119, 26] }, { name: '上海', coords: [121.5, 31.2] },
                { name: '重庆', coords: [107, 29] }, { name: '陕西', coords: [108, 34] },
                { name: '辽宁', coords: [123, 41] }, { name: '河北', coords: [115, 38] },
                { name: '江西', coords: [116, 28] }, { name: '天津', coords: [117.2, 39.1] },
                { name: '云南', coords: [102, 25] }, { name: '贵州', coords: [106, 27] }
            ];
        }
        
        function getCityLabels() {
            if (!cityData[currentProvince]) return [];
            return cityData[currentProvince]
                .filter(c => c.latitude && c.longitude)
                .slice(0, 15)
                .map(c => ({ name: c.city_name, coords: [parseFloat(c.longitude), parseFloat(c.latitude)] }));
        }
        
        function showProvinceTooltip(event, name, viewType) {
            const tooltip = document.getElementById('province-tooltip');
            let data;
            
            if (viewType === 'china') {
                data = provinceData.find(p => normalizeName(p.province_name) === normalizeName(name));
                if (!data) data = provinceData.find(p => p.province_name?.includes(name));
            } else {
                data = cityData[currentProvince]?.find(c => normalizeName(c.city_name) === normalizeName(name));
            }
            
            const count = data ? (data.patent_count || data.count || 0) : 0;
            const label = viewType === 'china' ? (data?.province_name || name) : (data?.city_name || name);
            
            if (count === 0) {
                tooltip.classList.remove('visible');
                return;
            }
            
            document.getElementById('tooltip-title').textContent = `${label} (${count}项专利)`;
            
            // 加载专利列表
            const apiPath = viewType === 'china' 
                ? `${API_BASE}/patents/province/${encodeURIComponent(label)}?page_size=50`
                : `${API_BASE}/patents/city/${encodeURIComponent(currentProvince)}/${encodeURIComponent(label)}?page_size=50`;
            
            fetch(apiPath)
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        const patentsHtml = result.data.map(p => `
                            <div class="patent-item" onclick="showPatentDetail('${p.public_number}')">
                                <div class="public-number">${p.public_number}</div>
                                <div class="title">${p.title || ''}</div>
                            </div>
                        `).join('') || '<div style="color:#646a80;padding:10px;">暂无数据</div>';
                        document.getElementById('tooltip-patents').innerHTML = patentsHtml;
                    }
                })
                .catch(e => console.error(e));
            
            // 定位悬浮框
            tooltip.classList.add('visible');
            positionTooltip(event);
            
            // 处理鼠标进入悬浮框
            tooltip.onmouseenter = () => { isTooltipHovered = true; };
            tooltip.onmouseleave = () => { 
                isTooltipHovered = false; 
                tooltip.classList.remove('visible');
            };
        }
        
        function positionTooltip(event) {
            const tooltip = document.getElementById('province-tooltip');
            let x = event.pageX + 15;
            let y = event.pageY + 15;
            
            if (x + 340 > window.innerWidth) x = event.pageX - 335;
            if (y + 420 > window.innerHeight) y = event.pageY - 420;
            
            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        }
        
        function hideProvinceTooltip() {
            setTimeout(() => {
                if (!isTooltipHovered) {
                    document.getElementById('province-tooltip').classList.remove('visible');
                }
            }, 100);
        }
        
        async function selectProvince(provinceName) {
            const provinceCities = await loadCities(provinceName);
            if (provinceCities && provinceCities.length > 0) {
                currentProvince = provinceName;
                provinceData = provinceCities.map(c => ({
                    city_name: c.city_name,
                    count: c.patent_count,
                    latitude: c.latitude,
                    longitude: c.longitude
                }));
                currentView = 'province';
                document.getElementById('current-location').style.display = 'inline-block';

        function drawSankeyChart(container, data) {
            container.innerHTML = '';
            const width = container.clientWidth;
            const height = container.clientHeight || 400;
            const padding = { top: 40, right: 100, bottom: 40, left: 100 };
            
            const svg = d3.select(container).append('svg')
                .attr('width', width)
                .attr('height', height);
            
            // 节点颜色映射
            const nodeColors = {
                '发明申请': '#667eea',
                '授权发明': '#764ba2',
                '实用新型': '#f093fb',
                '外观设计': '#64b5f6',
                '已授权': '#81c784',
                '审查中': '#ffb74d',
                '已公开': '#4dd0e1',
                '已驳回': '#e57373',
                '已撤回': '#ce93d8',
                '未缴年费': '#ff8a65',
                '期限届满': '#90a4ae',
                '权利转移': '#a8b2d1',
                '许可': '#ccd6f6',
                '其他': '#646a80',
                '专利总数': '#667eea',
                'topic': '#f093fb',
                'ipc': '#667eea'
            };
            
            // 构建节点映射
            const nodeMap = {};
            data.nodes.forEach(n => {
                nodeMap[n.name] = {
                    ...n,
                    totalValue: n.value || 0
                };
            });
            
            // 计算每个节点的总值（从links计算）
            data.links.forEach(l => {
                if (nodeMap[l.source]) nodeMap[l.source].totalValue += l.value;
                if (nodeMap[l.target]) nodeMap[l.target].totalValue += l.value;
            });
            
            // 分离节点
            const leftNodes = data.nodes.filter(n => n.category === 'total' || n.category === 'type' || n.category === 'topic');
            const rightNodes = data.nodes.filter(n => n.category === 'status' || n.category === 'ipc');
            
            // 节点尺寸
            const nodeWidth = 18;
            
            // 计算节点高度（根据值）
            const maxLinkValue = Math.max(...data.links.map(l => l.value), 1);
            const nodeHeightScale = d3.scaleLinear().domain([0, maxLinkValue]).range([30, 60]);
            
            const availableHeight = height - padding.top - padding.bottom;
            
            // 布局计算
            if (currentSankeyType === 'ipc') {
                // IPC分类分布图 - 左：总数，右：各分类
                leftNodes.forEach((node, i) => {
                    const n = nodeMap[node.name];
                    n.x0 = padding.left;
                    n.x1 = padding.left + nodeWidth;
                    n.y0 = padding.top + availableHeight / 2;
                    n.y1 = n.y0 + nodeHeightScale(n.totalValue / 2);
                });
                
                // IPC分类（按数量排序）
                const sortedRight = [...rightNodes].sort((a, b) => (b.value || 0) - (a.value || 0));
                const rightSpacing = availableHeight / (sortedRight.length + 1);
                sortedRight.forEach((node, i) => {
                    const n = nodeMap[node.name];
                    n.x0 = width - padding.right - nodeWidth;
                    n.x1 = width - padding.right;
                    n.y0 = padding.top + rightSpacing * (i + 1);
                    n.y1 = n.y0 + nodeHeightScale(n.totalValue / 2);
                });
            } else if (currentSankeyType === 'topic') {
                // 主题-IPC图 - 左：主题，右：IPC分类
                const leftSpacing = availableHeight / (leftNodes.length + 1);
                leftNodes.forEach((node, i) => {
                    const n = nodeMap[node.name];
                    n.x0 = padding.left;
                    n.x1 = padding.left + nodeWidth;
                    n.y0 = padding.top + leftSpacing * (i + 1);
                    n.y1 = n.y0 + nodeHeightScale(n.totalValue / 2);
                });
                
                const rightSpacing = availableHeight / (rightNodes.length + 1);
                rightNodes.forEach((node, i) => {
                    const n = nodeMap[node.name];
                    n.x0 = width - padding.right - nodeWidth;
                    n.x1 = width - padding.right;
                    n.y0 = padding.top + rightSpacing * (i + 1);
                    n.y1 = n.y0 + nodeHeightScale(n.totalValue / 2);
                });
            } else {
                // 法律状态流转 - 左：专利类型，右：法律状态
                const leftSpacing = availableHeight / (leftNodes.length + 1);
                leftNodes.forEach((node, i) => {
                    const n = nodeMap[node.name];
                    n.x0 = padding.left;
                    n.x1 = padding.left + nodeWidth;
                    n.y0 = padding.top + leftSpacing * (i + 1);
                    n.y1 = n.y0 + nodeHeightScale(n.totalValue / 2);
                });
                
                const rightSpacing = availableHeight / (rightNodes.length + 1);
                rightNodes.forEach((node, i) => {
                    const n = nodeMap[node.name];
                    n.x0 = width - padding.right - nodeWidth;
                    n.x1 = width - padding.right;
                    n.y0 = padding.top + rightSpacing * (i + 1);
                    n.y1 = n.y0 + nodeHeightScale(n.totalValue / 2);
                });
            }
            
            // 绘制连接
            const links = data.links.map(l => ({
                source: nodeMap[l.source],
                target: nodeMap[l.target],
                value: l.value
            })).filter(l => l.source && l.target);
            
            // 创建渐变
            const defs = svg.append('defs');
            links.forEach((link, i) => {
                const gradient = defs.append('linearGradient')
                    .attr('id', `sankey-gradient-${i}`)
                    .attr('gradientUnits', 'userSpaceOnUse')
                    .attr('x1', link.source.x1)
                    .attr('x2', link.target.x0);
                
                gradient.append('stop')
                    .attr('offset', '0%')
                    .attr('stop-color', nodeColors[link.source.name] || COLORS.primary);
                
                gradient.append('stop')
                    .attr('offset', '100%')
                    .attr('stop-color', nodeColors[link.target.name] || COLORS.secondary);
            });
            
            // 绘制链接
            const linkGroup = svg.append('g').attr('class', 'sankey-links');
            const linkWidthScale = d3.scaleLinear().domain([0, maxLinkValue]).range([3, 15]);
            
            links.forEach((link, i) => {
                const sy = link.source.y0 + (link.source.y1 - link.source.y0) / 2;
                const ty = link.target.y0 + (link.target.y1 - link.target.y0) / 2;
                
                const path = d3.path();
                const cp = (link.target.x0 - link.source.x1) / 2;
                path.moveTo(link.source.x1, sy);
                path.bezierCurveTo(
                    link.source.x1 + cp, sy,
                    link.target.x0 - cp, ty,
                    link.target.x0, ty
                );
                
                linkGroup.append('path')
                    .attr('d', path.toString())
                    .attr('class', 'sankey-link')
                    .attr('stroke', `url(#sankey-gradient-${i})`)
                    .attr('stroke-width', linkWidthScale(link.value))
                    .attr('fill', 'none')
                    .on('mouseover', function() {
                        d3.select(this).attr('stroke-opacity', 0.9);
                        showSankeyTooltip(event, link);
                    })
                    .on('mouseout', function() {
                        d3.select(this).attr('stroke-opacity', 0.5);
                        hideTooltip();
                    });
            });
            
            // 绘制节点
            const nodeGroup = svg.append('g').attr('class', 'sankey-nodes');
            
            Object.values(nodeMap).forEach(node => {
                const g = nodeGroup.append('g')
                    .attr('class', 'sankey-node')
                    .attr('transform', `translate(${node.x0}, ${node.y0})`);
                
                const nodeColor = nodeColors[node.name] || COLORS.primary;
                const nodeH = Math.max(30, node.y1 - node.y0);
                
                g.append('rect')
                    .attr('width', node.x1 - node.x0)
                    .attr('height', nodeH)
                    .attr('fill', nodeColor)
                    .attr('rx', 4)
                    .attr('opacity', 0.9);
                
                // 标签
                if (node.x0 < width / 2) {
                    // 左侧节点 - 标签在右边
                    g.append('text')
                        .attr('x', node.x1 - node.x0 + 8)
                        .attr('y', nodeH / 2)
                        .attr('dy', '0.35em')
                        .attr('text-anchor', 'start')
                        .attr('fill', COLORS.textMuted)
                        .attr('font-size', '12px')
                        .attr('font-weight', '600')
                        .text(node.name);
                    
                    g.append('text')
                        .attr('x', node.x1 - node.x0 + 8)
                        .attr('y', nodeH / 2 + 14)
                        .attr('dy', '0.35em')
                        .attr('text-anchor', 'start')
                        .attr('fill', COLORS.textMuted)
                        .attr('font-size', '10px')
                        .attr('opacity', 0.7)
                        .text(node.totalValue.toLocaleString());
                } else {
                    // 右侧节点 - 标签在左边
                    g.append('text')
                        .attr('x', -8)
                        .attr('y', nodeH / 2)
                        .attr('dy', '0.35em')
                        .attr('text-anchor', 'end')
                        .attr('fill', COLORS.textMuted)
                        .attr('font-size', '12px')
                        .attr('font-weight', '600')
                        .text(node.name);
                    
                    g.append('text')
                        .attr('x', -8)
                        .attr('y', nodeH / 2 + 14)
                        .attr('dy', '0.35em')
                        .attr('text-anchor', 'end')
                        .attr('fill', COLORS.textMuted)
                        .attr('font-size', '10px')
                        .attr('opacity', 0.7)
                        .text(node.totalValue.toLocaleString());
                }
            });
        }
        
        // ========== 网络图 ==========
        let currentNetworkType = 'province';
        
        async function loadNetworkChart(type) {
            currentNetworkType = type;
            const container = document.getElementById('network-chart');
            container.innerHTML = '<div class="loading-overlay"><div class="spinner"></div><div style="color:#667eea;font-size:12px;">网络图加载中...</div></div>';

        function drawNetworkChart(container, data) {
            container.innerHTML = '';
            const width = container.clientWidth;
            const height = container.clientHeight || 400;
            const padding = { left: 100, right: 100, top: 40, bottom: 40 };
            
            const svg = d3.select(container).append('svg')
                .attr('width', width)
                .attr('height', height);
            
            // 创建节点映射
            const nodeMap = {};
            data.nodes.forEach(n => {
                nodeMap[n.name] = {
                    ...n,
                    links: 0,
                    totalValue: n.value || 1
                };
            });
            
            // 计算节点度数和总值
            data.links.forEach(l => {
                if (nodeMap[l.source]) {
                    nodeMap[l.source].links++;
                    nodeMap[l.source].totalValue += l.value;
                }
                if (nodeMap[l.target]) {
                    nodeMap[l.target].links++;
                    nodeMap[l.target].totalValue += l.value;
                }
            });
            
            // 分离许可人和被许可人
            const licensorNodes = Object.values(nodeMap).filter(n => n.category === 'licensor' || n.category === 'applicant');
            const licenseeNodes = Object.values(nodeMap).filter(n => n.category === 'licensee');
            
            // 决定布局方式
            const nodes = Object.values(nodeMap);
            const hasBothCategories = licensorNodes.length > 0 && licenseeNodes.length > 0;
            
            // 计算节点大小
            const maxValue = Math.max(...nodes.map(n => n.totalValue), 1);
            const nodeScale = d3.scaleLinear().domain([0, maxValue]).range([10, 30]);
            
            if (hasBothCategories && licenseeNodes.length > 2) {
                // 许可转让网络 - 左右布局
                const contentWidth = width - padding.left - padding.right;
                const contentHeight = height - padding.top - padding.bottom;
                
                // 左：许可人
                licensorNodes.forEach((node, i) => {
                    node.x = padding.left + 40;
                    node.y = padding.top + (i + 1) * contentHeight / (licensorNodes.length + 1);
                });
                
                // 右：被许可人
                licenseeNodes.forEach((node, i) => {
                    node.x = width - padding.right - 40;
                    node.y = padding.top + (i + 1) * contentHeight / (licenseeNodes.length + 1);
                });
                
                // 绘制链接
                const linkGroup = svg.append('g').attr('class', 'network-links');
                const linkScale = d3.scaleLinear().domain([0, maxValue]).range([2, 6]);
                
                data.links.forEach(link => {
                    const source = nodeMap[link.source];
                    const target = nodeMap[link.target];
                    if (source && target) {
                        const sy = source.y;
                        const ty = target.y;
                        
                        const path = d3.path();
                        const cp = (target.x - source.x) / 2;
                        path.moveTo(source.x + 15, sy);
                        path.bezierCurveTo(
                            source.x + cp, sy,
                            target.x - cp, ty,
                            target.x - 15, ty
                        );
                        
                        linkGroup.append('path')
                            .attr('d', path.toString())
                            .attr('class', 'network-link')
                            .attr('stroke', '#667eea')
                            .attr('stroke-width', linkScale(link.value))
                            .attr('fill', 'none')
                            .attr('stroke-opacity', 0.5)
                            .on('mouseover', function() {
                                d3.select(this).attr('stroke-opacity', 0.9);
                                showNetworkTooltip(event, link);
                            })
                            .on('mouseout', function() {
                                d3.select(this).attr('stroke-opacity', 0.5);
                                hideTooltip();
                            });
                    }
                });
            } else {
                // 省份网络 - 圆形布局
                const centerX = width / 2;
                const centerY = height / 2;
                const radius = Math.min(width, height) / 2 - 80;
                
                nodes.forEach((node, i) => {
                    const angle = (2 * Math.PI * i) / nodes.length - Math.PI / 2;
                    node.x = centerX + radius * Math.cos(angle);
                    node.y = centerY + radius * Math.sin(angle);
                });
                
                // 绘制链接
                const linkGroup = svg.append('g').attr('class', 'network-links');
                const linkMaxValue = Math.max(...data.links.map(l => l.value), 1);
                const linkScale = d3.scaleLinear().domain([0, linkMaxValue]).range([2, 8]);
                
                data.links.forEach(link => {
                    const source = nodeMap[link.source];
                    const target = nodeMap[link.target];
                    if (source && target) {
                        linkGroup.append('line')
                            .attr('class', 'network-link')
                            .attr('x1', source.x)
                            .attr('y1', source.y)
                            .attr('x2', target.x)
                            .attr('y2', target.y)
                            .attr('stroke-width', linkScale(link.value))
                            .on('mouseover', function() {
                                d3.select(this).attr('stroke-opacity', 0.9);
                                showNetworkTooltip(event, link);
                            })
                            .on('mouseout', function() {
                                d3.select(this).attr('stroke-opacity', 0.3);
                                hideTooltip();
                            });
                    }
                });
            }
            
            // 绘制节点
            const nodeGroup = svg.append('g').attr('class', 'network-nodes');
            const colorScale = d3.scaleOrdinal(d3.schemeCategory10);
            
            nodes.forEach((node, i) => {
                const g = nodeGroup.append('g')
                    .attr('class', 'network-node')
                    .attr('transform', `translate(${node.x}, ${node.y})`);
                
                const nodeSize = nodeScale(node.totalValue);
                const nodeColor = node.category === 'licensor' ? '#667eea' : 
                                 node.category === 'licensee' ? '#f093fb' : 
                                 colorScale(i % 10);
                
                g.append('circle')
                    .attr('r', nodeSize)
                    .attr('fill', nodeColor)
                    .attr('stroke', '#0f0f1a')
                    .attr('stroke-width', 2)
                    .attr('opacity', 0.85);
                
                // 标签
                const labelX = node.category === 'licensor' ? -nodeSize - 8 : 
                              node.category === 'licensee' ? nodeSize + 8 : 0;
                const anchor = node.category === 'licensor' ? 'end' : 
                             node.category === 'licensee' ? 'start' : 'middle';
                
                g.append('text')
                    .attr('x', labelX)
                    .attr('dy', 4)
                    .attr('text-anchor', anchor)
                    .attr('fill', '#a8b2d1')
                    .attr('font-size', '11px')
                    .attr('font-weight', '500')
                    .text(node.name.length > 12 ? node.name.substring(0, 12) + '..' : node.name);
                
                // 值标签
                g.append('text')
                    .attr('dy', -nodeSize - 6)
                    .attr('text-anchor', anchor)
                    .attr('fill', nodeColor)
                    .attr('font-size', '9px')
                    .text(node.totalValue);
            });
            
            // 添加标题
            const titleText = hasBothCategories 
                ? `许可人: ${licensorNodes.length} | 被许可人: ${licenseeNodes.length} | 边: ${data.links.length}`
                : `共 ${nodes.length} 个节点，${data.links.length} 条边`;
            svg.append('text')
                .attr('x', width / 2)
                .attr('y', 20)
                .attr('text-anchor', 'middle')
                .attr('fill', '#8892b0')
                .attr('font-size', '11px')
                .text(titleText);
        }
        
        // ========== 工具函数 ==========
        function showSankeyTooltip(event, link) {
            showTooltip(event, `${link.source.name} → ${link.target.name}<br>流转数量: ${link.value}`);
        }
        
        function showNetworkTooltip(event, link) {
            showTooltip(event, `${link.source} → ${link.target}<br>流转数量: ${link.value}`);
        }
        
        function showTooltip(event, html) {
            hideTooltip();
            const tooltip = document.createElement('div');
            tooltip.id = 'flow-tooltip';
            tooltip.style.cssText = `
                position: fixed;
                background: linear-gradient(145deg, rgba(25, 28, 45, 0.98), rgba(18, 20, 35, 0.99));
                border: 1px solid rgba(102, 126, 234, 0.4);
                border-radius: 10px;
                padding: 12px;
                font-size: 12px;
                color: #a8b2d1;
                z-index: 1000;
                pointer-events: none;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
                max-width: 200px;
            `;
            tooltip.innerHTML = html;
            document.body.appendChild(tooltip);
            
            let x = event.pageX + 15;
            let y = event.pageY + 15;
            if (x + 220 > window.innerWidth) x = event.pageX - 205;
            if (y + 80 > window.innerHeight) y = event.pageY - 80;
            
            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        }
        
        function hideTooltip() {
            const tooltip = document.getElementById('flow-tooltip');
            if (tooltip) tooltip.remove();
        }
    </script>
</body>
</html>
